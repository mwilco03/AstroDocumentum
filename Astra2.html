<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astra Grid</title>
  <style>
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f5;
      --color-text-primary: #000000;
      --color-text-secondary: #666666;
      --color-border-tertiary: #e0e0e0;
      --color-border-secondary: #cccccc;
      --color-background-info: #e6f1fb;
      --color-text-info: #185fa5;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1a1a1a;
        --color-background-secondary: #2a2a2a;
        --color-text-primary: #ffffff;
        --color-text-secondary: #aaaaaa;
        --color-border-tertiary: #444444;
        --color-border-secondary: #555555;
        --color-background-info: #0c447c;
        --color-text-info: #b5d4f4;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--color-background-primary);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      padding: 2rem;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    h2 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 1rem;
      color: var(--color-text-primary);
    }

    .grid-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .main-grid {
      display: grid;
      grid-template-columns: auto auto auto;
      gap: 8px;
      border: 0.5px solid var(--color-border-tertiary);
      padding: 1rem;
      border-radius: var(--border-radius-lg);
      background-color: var(--color-background-secondary);
    }

    .grid-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      min-width: 64px;
      padding: 8px;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      background-color: var(--color-background-primary);
      overflow: hidden;
      font-size: 14px;
    }

    .grid-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    select {
      padding: 6px 8px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background-color: var(--color-background-primary);
      color: var(--color-text-primary);
      font-size: 14px;
      cursor: pointer;
      min-height: 36px;
      min-width: 80px;
    }

    select:hover {
      border-color: var(--color-border-secondary);
    }

    select:focus {
      outline: none;
      border-color: var(--color-text-info);
      box-shadow: 0 0 0 2px var(--color-background-info);
    }

    .secondary-grid {
      display: grid;
      grid-template-columns: auto auto;
      gap: 8px;
      border: 0.5px solid var(--color-border-tertiary);
      padding: 1rem;
      border-radius: var(--border-radius-lg);
      background-color: var(--color-background-secondary);
    }

    .planet-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80px;
      padding: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .planet-cell img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
    }

    .books-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .book-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      font-size: 14px;
    }

    .book-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--color-text-info);
    }

    .book-item label {
      cursor: pointer;
      flex: 1;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 2rem;
    }

    button {
      padding: 8px 16px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background-color: transparent;
      color: var(--color-text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: var(--color-background-secondary);
    }

    button:active {
      transform: scale(0.98);
    }

    .code-section {
      margin-top: 1.5rem;
    }

    .digit-inputs {
      display: flex;
      gap: 8px;
    }

    .digit-input {
      width: 50px;
      height: 50px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background-color: var(--color-background-primary);
      color: var(--color-text-primary);
    }

    .digit-input:focus {
      outline: none;
      border-color: var(--color-text-info);
      box-shadow: 0 0 0 2px var(--color-background-info);
    }

    .right-column {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="grid-section">
      <h2>Main grid</h2>
      <div class="main-grid" id="mainGrid"></div>
      
      <div class="code-section">
        <h2>Code</h2>
        <div class="digit-inputs" id="digitInputs"></div>
      </div>
    </div>

    <div class="right-column">
      <div class="grid-section">
        <h2>Planets</h2>
        <div class="secondary-grid" id="secondaryGrid"></div>
      </div>

      <div class="books-section">
        <h2>Books</h2>
        <div id="booksList"></div>
        <div class="controls">
          <button id="resetBtn">Reset all</button>
        </div>
      </div>
    </div>
  </div>

    const CONSTANTS = {
      MAIN_GRID_ROWS: 5,
      PRIMARY_DROPDOWN: {
        OPTIONS: ["1", "2", "3", "4", "5", "-"],
        KEY_PREFIX: "primary_"
      },
      SECONDARY_DROPDOWN: {
        OPTIONS: ["N", "NE", "E", "SE", "S", "SW", "W", "NW"],
        KEY_PREFIX: "secondary_"
      },
      PLANETS: [
        { name: "Mars", id: "mars" },
        { name: "Saturn", id: "saturn" },
        { name: "Neptune", id: "neptune" }
      ],
      BOOKS: [
        "Pyramids of Cydonia",
        "Silence at Singularity",
        "Witchlight Codex",
        "Ash and Bone",
        "Echoes of Andromeda",
        "The Unknowable Void",
        "The Musica Universalis",
        "The Black Veil",
        "The Moon Directive"
      ],
      STORAGE_KEY_PREFIX: "astra_",
      DIGIT_COUNT: 4
    };

    const state = {
      primary: {},
      secondary: {},
      books: {},
      digits: []
    };

    function initState() {
      for (let i = 0; i < CONSTANTS.MAIN_GRID_ROWS; i++) {
        const key = CONSTANTS.PRIMARY_DROPDOWN.KEY_PREFIX + i;
        const stored = localStorage.getItem(CONSTANTS.STORAGE_KEY_PREFIX + key);
        state.primary[i] = stored || CONSTANTS.PRIMARY_DROPDOWN.OPTIONS[0];
      }

      CONSTANTS.PLANETS.forEach(planet => {
        const key = CONSTANTS.SECONDARY_DROPDOWN.KEY_PREFIX + planet.id;
        const stored = localStorage.getItem(CONSTANTS.STORAGE_KEY_PREFIX + key);
        state.secondary[planet.id] = stored || CONSTANTS.SECONDARY_DROPDOWN.OPTIONS[0];
      });

      CONSTANTS.BOOKS.forEach((book, idx) => {
        const key = "book_" + idx;
        const stored = localStorage.getItem(CONSTANTS.STORAGE_KEY_PREFIX + key);
        state.books[idx] = stored === "true";
      });

      for (let i = 0; i < CONSTANTS.DIGIT_COUNT; i++) {
        const key = "digit_" + i;
        const stored = localStorage.getItem(CONSTANTS.STORAGE_KEY_PREFIX + key);
        state.digits[i] = stored || "";
      }
    }

    function saveState() {
      Object.entries(state.primary).forEach(([idx, value]) => {
        const key = CONSTANTS.PRIMARY_DROPDOWN.KEY_PREFIX + idx;
        localStorage.setItem(CONSTANTS.STORAGE_KEY_PREFIX + key, value);
      });

      Object.entries(state.secondary).forEach(([planetId, value]) => {
        const key = CONSTANTS.SECONDARY_DROPDOWN.KEY_PREFIX + planetId;
        localStorage.setItem(CONSTANTS.STORAGE_KEY_PREFIX + key, value);
      });

      Object.entries(state.books).forEach(([idx, checked]) => {
        const key = "book_" + idx;
        localStorage.setItem(CONSTANTS.STORAGE_KEY_PREFIX + key, checked ? "true" : "false");
      });

      state.digits.forEach((digit, idx) => {
        const key = "digit_" + idx;
        localStorage.setItem(CONSTANTS.STORAGE_KEY_PREFIX + key, digit);
      });
    }

    // Cache for cropped symbol images
    const croppedSymbols = { left: [], center: [] };
    let symbolsReady = false;

    function cropSprite(spriteDataUrl, numSymbols) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = function() {
          const symbolHeight = img.height / numSymbols;
          const results = [];
          for (let i = 0; i < numSymbols; i++) {
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = symbolHeight;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, -i * symbolHeight);
            results.push(canvas.toDataURL("image/png"));
          }
          resolve(results);
        };
        img.src = spriteDataUrl;
      });
    }

    async function initSymbols() {
      croppedSymbols.left = await cropSprite(SYMBOL_IMAGES.left[0], CONSTANTS.MAIN_GRID_ROWS);
      croppedSymbols.center = await cropSprite(SYMBOL_IMAGES.center[0], CONSTANTS.MAIN_GRID_ROWS);
      symbolsReady = true;
      renderMainGrid();
    }

    function renderMainGrid() {
      if (!symbolsReady) return;
      
      const grid = document.getElementById("mainGrid");
      grid.innerHTML = "";

      for (let row = 0; row < CONSTANTS.MAIN_GRID_ROWS; row++) {
        const cell1 = document.createElement("div");
        cell1.className = "grid-cell";
        const img1 = document.createElement("img");
        img1.src = croppedSymbols.left[row];
        img1.alt = "Symbol";
        cell1.appendChild(img1);
        grid.appendChild(cell1);

        const cell2 = document.createElement("div");
        cell2.className = "grid-cell";
        const img2 = document.createElement("img");
        img2.src = croppedSymbols.center[row];
        img2.alt = "Symbol";
        cell2.appendChild(img2);
        grid.appendChild(cell2);

        const cell3 = document.createElement("div");
        cell3.className = "grid-cell";
        const select = document.createElement("select");
        select.id = CONSTANTS.PRIMARY_DROPDOWN.KEY_PREFIX + row;
        CONSTANTS.PRIMARY_DROPDOWN.OPTIONS.forEach(option => {
          const opt = document.createElement("option");
          opt.value = option;
          opt.textContent = option;
          select.appendChild(opt);
        });
        select.value = state.primary[row];
        select.addEventListener("change", (e) => {
          state.primary[row] = e.target.value;
          saveState();
        });
        cell3.appendChild(select);
        grid.appendChild(cell3);
      }
    }

    function renderSecondaryGrid() {
      const grid = document.getElementById("secondaryGrid");
      grid.innerHTML = "";

      CONSTANTS.PLANETS.forEach(planet => {
        const cell1 = document.createElement("div");
        cell1.className = "grid-cell";
        const img = document.createElement("img");
        img.src = PLANET_IMAGES[planet.id];
        img.alt = planet.name;
        img.style.height = "64px";
        img.style.width = "auto";
        cell1.appendChild(img);
        grid.appendChild(cell1);

        const cell2 = document.createElement("div");
        cell2.className = "grid-cell";
        const select = document.createElement("select");
        select.id = CONSTANTS.SECONDARY_DROPDOWN.KEY_PREFIX + planet.id;
        CONSTANTS.SECONDARY_DROPDOWN.OPTIONS.forEach(option => {
          const opt = document.createElement("option");
          opt.value = option;
          opt.textContent = option;
          select.appendChild(opt);
        });
        select.value = state.secondary[planet.id];
        select.addEventListener("change", (e) => {
          state.secondary[planet.id] = e.target.value;
          saveState();
        });
        cell2.appendChild(select);
        grid.appendChild(cell2);
      });
    }

    function renderBooks() {
      const list = document.getElementById("booksList");
      list.innerHTML = "";

      CONSTANTS.BOOKS.forEach((book, idx) => {
        const item = document.createElement("div");
        item.className = "book-item";

        const input = document.createElement("input");
        input.type = "checkbox";
        input.id = "book_" + idx;
        input.checked = state.books[idx];
        input.addEventListener("change", (e) => {
          state.books[idx] = e.target.checked;
          saveState();
        });

        const label = document.createElement("label");
        label.htmlFor = "book_" + idx;
        label.textContent = book;

        item.appendChild(input);
        item.appendChild(label);
        list.appendChild(item);
      });
    }

    function renderDigits() {
      const container = document.getElementById("digitInputs");
      container.innerHTML = "";

      for (let i = 0; i < CONSTANTS.DIGIT_COUNT; i++) {
        const input = document.createElement("input");
        input.type = "text";
        input.className = "digit-input";
        input.maxLength = 1;
        input.inputMode = "numeric";
        input.pattern = "[0-9]";
        input.value = state.digits[i] || "";
        
        input.addEventListener("input", (e) => {
          const val = e.target.value.replace(/[^0-9]/g, "");
          e.target.value = val;
          state.digits[i] = val;
          saveState();
          
          if (val && i < CONSTANTS.DIGIT_COUNT - 1) {
            const nextInput = container.children[i + 1];
            if (nextInput) nextInput.focus();
          }
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !e.target.value && i > 0) {
            const prevInput = container.children[i - 1];
            if (prevInput) prevInput.focus();
          }
        });

        container.appendChild(input);
      }
    }

    function resetAll() {
      if (confirm("Reset all selections?")) {
        localStorage.clear();
        for (let i = 0; i < CONSTANTS.MAIN_GRID_ROWS; i++) {
          state.primary[i] = CONSTANTS.PRIMARY_DROPDOWN.OPTIONS[0];
        }
        CONSTANTS.PLANETS.forEach(planet => {
          state.secondary[planet.id] = CONSTANTS.SECONDARY_DROPDOWN.OPTIONS[0];
        });
        CONSTANTS.BOOKS.forEach((_, idx) => {
          state.books[idx] = false;
        });
        for (let i = 0; i < CONSTANTS.DIGIT_COUNT; i++) {
          state.digits[i] = "";
        }
        saveState();
        render();
      }
    }

    function render() {
      if (symbolsReady) renderMainGrid();
      renderSecondaryGrid();
      renderBooks();
      renderDigits();
    }

    document.getElementById("resetBtn").addEventListener("click", resetAll);

    initState();
    render();
    initSymbols();
  </script>
</body>
</html>
